a López",src:"Único con estudio controlado (~28% fuerza/8 sem).",body:"Bloques separados, la regleta es el motor, autorregulación por margen al fallo. MaxHangs cargados (MAW) → borde mínimo (MED).",use:"En tu plan: columna del hangboard en la Fase 1."},{icon:"🅱",name:"No-hang first — Lattice / Nelson",src:"Loading pin como base → más frecuencia, menos riesgo.",body:"Cargas fuerte sin colgar el cuerpo. Trabajo por % de tu RM, tests de 3–5RM, pirámides. IntHangs en regleta de complemento.",use:"En tu plan: filosofía base — motor en F0 y mitad de F1.",highlight:!0},{icon:"🅲",name:"Reclutamiento máx — Gravelle",src:"Gravelle (V15, 68 kg) → arm-lift 100 kg = 147% PC.",body:"Cargas muy altas, pocas reps, mucho descanso, entrenar fresco. MVC-7 (lift máximo 5–7 s) + peaking 90–95%.",use:"En tu plan: final de F1 y peaking de F3."}],S="Loading pin (tu motor)",E="Estilo Nelson / Gravelle / Beall.",N=[["Fase 0","4×5 reps","65–70% 5RM · RPE 6–7"],["Fase 1","5×3 reps o lift 5–7 s","85–90% 5RM · RPE 8–9"],["Fase 2","3×3 (mant.)","85%"],["Fase 3 (peak)","2 sets · 1–2 reps","90–95%"]],C="A una mano, half-crimp, en el cubo enganchado al pin. Descanso 3 min. Sube 2–5 kg cuando el RPE baje. Tu arm-lift inicial: 30 kg en 15 mm fácil (≈43% PC) → tu 5RM real es más alto, testéalo.",P="Hangboard MaxHangs (Eva López)",j="El protocolo con estudio controlado detrás.",R=[["Colgada","10 s (rango 5–15 s)"],["Sets","3–5 (progresa 3→5)"],["Descanso","3 min"],["Margen al fallo","~3 s en reserva (RPE ~8)"],["Borde","15 mm half-crimp + lastre"],["Frecuencia","1×/sem (Mié) · escalar da el resto"]],_="Margen >3 s → +2–5 kg; margen ~0 → −2–5 kg. La 10 mm es min-edge, déjala para fases avanzadas.",T=["Yema sangra o 'tira' una polea (dolor agudo en la base del dedo) → para, NO más dedos esa semana.","Codo de escalador (dolor cara interna/externa del codo) → baja el volumen de JALAR (dominadas/remo), no lo subas.","Chasquido/pop en un dedo → fin de sesión, hielo, evaluar.","Dormiste <6 h → sesión a 60% o p
